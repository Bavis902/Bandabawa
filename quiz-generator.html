<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #quiz-form { margin: 20px; }
        #quiz-output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Quiz Generator</h1>
    <div id="quiz-form">
        <label for="question">Question:</label><br>
        <input type="text" id="question" required><br>
        <label for="options">Options (comma separated):</label><br>
        <input type="text" id="options" required><br>
        <button onclick="generateQuiz()">Generate Quiz</button>
    </div>
    <div id="quiz-output"></div>
    <script>
        function generateQuiz() {
            const question = document.getElementById('question').value;
            const options = document.getElementById('options').value.split(',');
            const outputDiv = document.getElementById('quiz-output');

            // Clear previous output safely
            outputDiv.textContent = '';

            const heading = document.createElement('h2');
            heading.textContent = 'Your Quiz';
            outputDiv.appendChild(heading);

            const questionP = document.createElement('p');
            questionP.textContent = question;
            outputDiv.appendChild(questionP);

            options.forEach((option) => {
                const trimmed = option.trim();
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'quiz-option';
                radio.value = trimmed;
                label.appendChild(radio);
                label.appendChild(document.createTextNode(' ' + trimmed));
                outputDiv.appendChild(label);
                outputDiv.appendChild(document.createElement('br'));
            });
        }
    </script>
</body>
</html>
