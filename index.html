<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #quiz-container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .question { margin-bottom: 20px; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; }
    </style>
</head>
<body>
    <div id="quiz-container">
        <div class="question">
            <h2 id="question-display">Question goes here</h2>
        </div>
        <ul class="options">
            <li><label><input type="radio" name="option" value="1"> Option 1</label></li>
            <li><label><input type="radio" name="option" value="2"> Option 2</label></li>
            <li><label><input type="radio" name="option" value="3"> Option 3</label></li>
            <li><label><input type="radio" name="option" value="4"> Option 4</label></li>
        </ul>
        <button id="submit-answer">Submit Answer</button>
    </div>

    <script>
        // JavaScript for quiz functionality will go here
        document.getElementById('submit-answer').addEventListener('click', function() {
            const selectedOption = document.querySelector('input[name="option"]:checked');
            if (selectedOption) {
                alert('You selected Option ' + selectedOption.value);
            } else {
                alert('Please select an option.');
            }
        });
    </script>
</body>
</html>
